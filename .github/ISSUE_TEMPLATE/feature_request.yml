name: Feature request
description: Suggest an idea for SpessaFont!
labels: ["enhancement"]
body:
    - type: textarea
      id: problem
      attributes:
          label: Problem
          description: What problem are you trying to solve? Describe the current behavior and why it's a problem.
    - type: textarea
      id: description
      attributes:
          label: Description
          description: A clear and concise description of what you want to happen.
      validations:
          required: true
    - type: textarea
      id: alternatives
      attributes:
          label: Alternatives
          description: Describe alternatives you've considered (if any)
    - type: textarea
      attributes:
          label: Additional info
          description: Any additional info and attachments (screenshots, MIDIs, soundfonts, other environments) go here.
      validations:
          required: false
